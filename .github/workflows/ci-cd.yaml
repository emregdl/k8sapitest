name: CI/CD

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to GHCR
        run: echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build image
        run: docker build -t ghcr.io/KULLANICI_ADI/k8s-health-dashboard:${{ github.sha }} .

      - name: Push image
        run: docker push ghcr.io/KULLANICI_ADI/k8s-health-dashboard:${{ github.sha }}

      - name: Deploy to Kubernetes
        run: |
          echo "${{ secrets.KUBECONFIG_DATA }}" | base64 -d > kubeconfig
          export KUBECONFIG=$PWD/kubeconfig
          kubectl set image deployment/k8s-health-dashboard dashboard=ghcr.io/KULLANICI_ADI/k8s-health-dashboard:${{ github.sha }}